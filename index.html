<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Ziyad Alharbi</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Ziyad Alharbi</h1>
            <p><span id="typewriter"></span><span class="cursor">|</span></p>
        </div>
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
    </header>

    <main>
        <section id="about">
            <h2>About Me</h2>
            <p>I am a student at KFUPM currently working on my web development skills. My goal is to build clean, functional, and interactive applications that solve real-world problems.</p>
        </section>

        <section id="projects">
            <h2>My GitHub Projects</h2>
            <div id="github-projects" class="project-container">
                <p id="loading-msg">Loading projects from GitHub...</p>
            </div>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>
            <form id="contact-form">
                <input type="text" id="name" placeholder="Your Name">
                <input type="email" id="email" placeholder="Your Email">
                <textarea id="message" placeholder="Your Message"></textarea>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
            <div id="form-feedback" class="feedback-msg hidden"></div>
        </section>
    </main>

    <script src="js/script.js" defer></script>
</body>
</html>
